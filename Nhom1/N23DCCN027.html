<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Tailwind Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800">

<!-- Navbar -->
<header class="bg-blue-600 text-white">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <h1 class="text-lg font-semibold">MySite</h1>

        <!-- Mobile menu button -->
        <button class="block md:hidden text-2xl">
            ☰
        </button>

        <!-- Desktop menu -->
        <nav class="hidden md:flex gap-6 text-sm">
            <a href="#" class="hover:text-gray-200 transition">Home</a>
            <a href="#" class="hover:text-gray-200 transition">About</a>
            <a href="#" class="hover:text-gray-200 transition">Contact</a>
        </nav>
    </div>
</header>

<!-- Hero Section -->
<main class="max-w-6xl mx-auto px-6 py-16">
    <div class="flex flex-col md:flex-row items-center justify-center gap-10 md:gap-20 min-h-[70vh]">

        <!-- Logo -->
        <div class="flex justify-center">
            <img
                    src="https://cdn.icon-icons.com/icons2/2699/PNG/512/tailwindcss_logo_icon_170649.png"
                    alt="Tailwind CSS Logo"
                    class="w-50 md:w-70"
            />
        </div>

        <!-- Content -->
        <div class="text-center md:text-left max-w-md">
            <h2 class="text-2xl md:text-4xl font-bold mb-4">
                Learn Tailwind CSS
            </h2>
            <p class="text-gray-500 mb-6 text-sm md:text-base">
                Build responsive layouts quickly with utility-first CSS.
            </p>
            <button
                    class="bg-blue-600 text-white px-5 py-2 rounded-md hover:bg-blue-700 transition duration-300 shadow"
            >
                Get Started
            </button>
        </div>

    </div>
</main>

</body>
</html>
